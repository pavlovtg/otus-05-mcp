swagger: '2.0'
info:
  title: Triggersv2
  version: '2.0'
  description: Контракт для управления триггерами.
schemes: []
consumes:
  - application/json
basePath: /api/triggers/v2
produces:
  - application/json
paths:
  /triggers:
    get:
      operationId: GetTriggers
      description: Возвращает список триггеров
      parameters:
        - description: 'Типы метатригеров, которые будут включены в выборку. Если не указано - то все.'
          type: array
          items:
            type: string
          name: metatype
          in: query
          required: false
        - type: integer
          description: Указавыет ограничение количества возвращаемых триггеров.
          name: limit
          in: query
          required: false
          format: int32
        - type: integer
          description: Указавыет смещение от начала выборки для возвращаемых триггеров.
          name: offset
          in: query
          required: false
          format: int32
      responses:
        200:
          description: Список триггеров.
          schema:
            type: array
            items:
              $ref: '#/definitions/TriggerDto'
    post:
      operationId: CreateTrigger
      description: Создает новый триггер.
      parameters:
        - name: CreateTriggerCommand
          description: Команда создания триггера.
          in: body
          schema:
            $ref: '#/definitions/CreateTriggerCommand'
      responses:
        400:
          description: Указаны неверные параметры
          x-errors:
            - $ref: '#/definitions/NameNotSpecifiedError'
            - $ref: '#/definitions/NameNotUniqueError'
            - $ref: '#/definitions/MetatypeNotSpecifiedError'
            - $ref: '#/definitions/MetatypeUnknownError'
            - $ref: '#/definitions/ParametersPayloadNotSpecified'
            - $ref: '#/definitions/ExternalServiceUnavailableError'
            - $ref: '#/definitions/ParametersPayloadInvalidError'
            - $ref: '#/definitions/TimezoneInvalidError'
            - $ref: '#/definitions/TimezoneOffsetInvalidError'
            - $ref: '#/definitions/TimezoneAndTimeZoneOffsetNotSpecifiedError'
            - $ref: '#/definitions/SchedulingParametersNotSpecifiedError'
            - $ref: '#/definitions/PeriodicityTypeUnknownError'
            - $ref: '#/definitions/DateToLessThanDateFromError'
            - $ref: '#/definitions/RepeatIntervalNotSpecifiedError'
            - $ref: '#/definitions/RepeatIntervalLessThanMinuteError'
            - $ref: '#/definitions/RepeatIntervalHasSecondsError'
            - $ref: '#/definitions/RepeatIntervalExceedsLimitError'
            - $ref: '#/definitions/DaysOfWeekNotSpecifiedError'
            - $ref: '#/definitions/DaysOfWeekInvalidError'
            - $ref: '#/definitions/DaysOfMonthNotSpecifiedError'
            - $ref: '#/definitions/DaysOfMonthInvalidError'
            - $ref: '#/definitions/SchedulingParametersNeverFireError'
            - $ref: '#/definitions/ReactionsNotSpecifiedError'
            - $ref: '#/definitions/ReactionTypeUnknownError'
            - $ref: '#/definitions/EmailParticipantNotSpecifiedError'
            - $ref: '#/definitions/EmailParticipantTypeUnknownError'
            - $ref: '#/definitions/WebHookUrlNotSpecifiedError'
            - $ref: '#/definitions/WebHookUrlDuplicatedError'
            - $ref: '#/definitions/WebHookUriInvalidError'
            - $ref: '#/definitions/InvalidTriggerActivationError'
            - $ref: '#/definitions/ReactionNotAllowedError'
            - $ref: '#/definitions/FireAtTimeExceedsLimitError'
            - $ref: '#/definitions/EmailFormatInvalidError'
            - $ref: '#/definitions/InvalidInputDataFormatError'
            - $ref: '#/definitions/RecurrenceInvalidError'
            - $ref: '#/definitions/RecurrenceRangeInvalidError'
            - $ref: '#/definitions/CronExpressionInvalidError'
        201:
          description: Триггер успешно создан.
          schema:
            $ref: '#/definitions/CreatedTriggerResultDto'
        503:
          description: ServiceUnavailable
  /triggers/{triggerId}:
    get:
      operationId: GetTriggerById
      description: Возвращает описание триггера по идентифкатору.
      parameters:
        - type: string
          description: Идентификатор триггера.
          name: triggerId
          in: path
          required: true
          format: guid
      responses:
        400:
          description: BadRequest
          x-errors:
            - $ref: '#/definitions/TriggerNotFoundError'
        200:
          description: Описание тригера.
          schema:
            $ref: '#/definitions/TriggerDto'
    delete:
      operationId: RemoveTriggerById
      description: Удаляет триггер.
      parameters:
        - type: string
          description: Идентификатор триггера.
          name: triggerId
          in: path
          required: true
          format: guid
      responses:
        400:
          description: BadRequest
          x-errors:
            - $ref: '#/definitions/TriggerNotFoundError'
        204:
          description: Триггер успешно удален.
    put:
      description: Обновляет указанный триггер.
      operationId: UpdateTriggerCommand
      parameters:
        - type: string
          name: triggerId
          description: Идентификатор триггера.
          in: path
          required: true
          format: guid
        - name: triggerDto
          description: Команда обновления триггера.
          in: body
          schema:
            $ref: '#/definitions/UpdateTriggerCommand'
      responses:
        400:
          description: Указаны неверные параметры
          x-errors:
            - $ref: '#/definitions/NameNotSpecifiedError'
            - $ref: '#/definitions/NameNotUniqueError'
            - $ref: '#/definitions/MetatypeNotSpecifiedError'
            - $ref: '#/definitions/MetatypeUnknownError'
            - $ref: '#/definitions/ParametersPayloadNotSpecified'
            - $ref: '#/definitions/ExternalServiceUnavailableError'
            - $ref: '#/definitions/ParametersPayloadInvalidError'
            - $ref: '#/definitions/TimezoneInvalidError'
            - $ref: '#/definitions/TimezoneOffsetInvalidError'
            - $ref: '#/definitions/TimezoneAndTimeZoneOffsetNotSpecifiedError'
            - $ref: '#/definitions/SchedulingParametersNotSpecifiedError'
            - $ref: '#/definitions/PeriodicityTypeUnknownError'
            - $ref: '#/definitions/DateToLessThanDateFromError'
            - $ref: '#/definitions/RepeatIntervalNotSpecifiedError'
            - $ref: '#/definitions/RepeatIntervalLessThanMinuteError'
            - $ref: '#/definitions/RepeatIntervalHasSecondsError'
            - $ref: '#/definitions/RepeatIntervalExceedsLimitError'
            - $ref: '#/definitions/DaysOfWeekNotSpecifiedError'
            - $ref: '#/definitions/DaysOfWeekInvalidError'
            - $ref: '#/definitions/DaysOfMonthNotSpecifiedError'
            - $ref: '#/definitions/DaysOfMonthInvalidError'
            - $ref: '#/definitions/SchedulingParametersNeverFireError'
            - $ref: '#/definitions/ReactionsNotSpecifiedError'
            - $ref: '#/definitions/ReactionTypeUnknownError'
            - $ref: '#/definitions/EmailParticipantNotSpecifiedError'
            - $ref: '#/definitions/EmailParticipantTypeUnknownError'
            - $ref: '#/definitions/WebHookUrlNotSpecifiedError'
            - $ref: '#/definitions/WebHookUrlDuplicatedError'
            - $ref: '#/definitions/WebHookUriInvalidError'
            - $ref: '#/definitions/MetatypeChangeForbiddenError'
            - $ref: '#/definitions/TriggerNotFoundError'
            - $ref: '#/definitions/ReactionNotAllowedError'
            - $ref: '#/definitions/FireAtTimeExceedsLimitError'
            - $ref: '#/definitions/EmailFormatInvalidError'
            - $ref: '#/definitions/InvalidInputDataFormatError'
            - $ref: '#/definitions/RecurrenceInvalidError'
            - $ref: '#/definitions/RecurrenceRangeInvalidError'
            - $ref: '#/definitions/CronExpressionInvalidError'
        204:
          description: Триггер обновлен.
        503:
          description: ServiceUnavailable
  /triggers/{triggerId}/activate:
    post:
      operationId: ActivateTrigger
      parameters:
        - type: string
          description: Идентификатор триггера.
          name: triggerId
          in: path
          required: true
          format: guid
      responses:
        400:
          description: BadRequest
          x-errors:
            - $ref: '#/definitions/TriggerNotFoundError'
            - $ref: '#/definitions/InvalidTriggerActivationError'
            - $ref: '#/definitions/ReactionsNotSpecifiedError'
        204:
          description: Триггер активирован.
  /triggers/{triggerId}/deactivate:
    post:
      operationId: DectivateTrigger
      parameters:
        - type: string
          description: Идентификатор триггера.
          name: triggerId
          in: path
          required: true
          format: guid
      responses:
        400:
          description: BadRequest
          x-errors:
            - $ref: '#/definitions/TriggerNotFoundError'
        204:
          description: Триггер деактивирован.
  /triggers/scheduling_parameters/validate:
    post:
      operationId: ValidateSchedulingParameters
      parameters:
        - name: ValidateSchedulingParametersCommand
          description: Команда проверки валидности параметров планировщика.
          in: body
          schema:
            $ref: '#/definitions/TriggerBySchedulerParametersDto'
      responses:
        400:
          description: Указаны неверные параметры
          x-errors:
            - $ref: '#/definitions/TimezoneInvalidError'
            - $ref: '#/definitions/TimezoneOffsetInvalidError'
            - $ref: '#/definitions/TimezoneAndTimeZoneOffsetNotSpecifiedError'
            - $ref: '#/definitions/PeriodicityTypeUnknownError'
            - $ref: '#/definitions/DateToLessThanDateFromError'
            - $ref: '#/definitions/RepeatIntervalNotSpecifiedError'
            - $ref: '#/definitions/RepeatIntervalLessThanMinuteError'
            - $ref: '#/definitions/RepeatIntervalHasSecondsError'
            - $ref: '#/definitions/RepeatIntervalExceedsLimitError'
            - $ref: '#/definitions/DaysOfWeekNotSpecifiedError'
            - $ref: '#/definitions/DaysOfWeekInvalidError'
            - $ref: '#/definitions/DaysOfMonthNotSpecifiedError'
            - $ref: '#/definitions/DaysOfMonthInvalidError'
            - $ref: '#/definitions/SchedulingParametersNeverFireError'
            - $ref: '#/definitions/FireAtTimeExceedsLimitError'
            - $ref: '#/definitions/RecurrenceInvalidError'
            - $ref: '#/definitions/RecurrenceRangeInvalidError'
            - $ref: '#/definitions/CronExpressionInvalidError'
        200:
          description: Параметры планировщика валидны.
  
  /triggers/scheduling_parameters/calc_next_fires:
    post:
      operationId: CalcNextFires
      parameters:
        - name: calcNextFiresCommand
          description: Команда с параметрами планировщика
          in: body
          schema:
            $ref: '#/definitions/CalcNextFiresCommandDto'
      responses:
        400:
          description: Указаны неверные параметры
          x-errors:
            - $ref: '#/definitions/TimezoneInvalidError'
            - $ref: '#/definitions/TimezoneOffsetInvalidError'
            - $ref: '#/definitions/TimezoneAndTimeZoneOffsetNotSpecifiedError'
            - $ref: '#/definitions/PeriodicityTypeUnknownError'
            - $ref: '#/definitions/DateToLessThanDateFromError'
            - $ref: '#/definitions/RepeatIntervalNotSpecifiedError'
            - $ref: '#/definitions/RepeatIntervalLessThanMinuteError'
            - $ref: '#/definitions/RepeatIntervalHasSecondsError'
            - $ref: '#/definitions/RepeatIntervalExceedsLimitError'
            - $ref: '#/definitions/DaysOfWeekNotSpecifiedError'
            - $ref: '#/definitions/DaysOfWeekInvalidError'
            - $ref: '#/definitions/DaysOfMonthNotSpecifiedError'
            - $ref: '#/definitions/DaysOfMonthInvalidError'
            - $ref: '#/definitions/SchedulingParametersNeverFireError'
            - $ref: '#/definitions/FireAtTimeExceedsLimitError'
            - $ref: '#/definitions/RecurrenceInvalidError'
            - $ref: '#/definitions/RecurrenceRangeInvalidError'
            - $ref: '#/definitions/CronExpressionInvalidError'
        200:
          description: Список следующих запусков
          schema:
            $ref: '#/definitions/CalcNextFiresResponseDto'

  /triggers/reaction/webhook/check:
    post:
      operationId: CheckWebHookReaction
      parameters:
        - name: checkWebHookReactionCommand
          description: Команда для проверки настроек web hook reaction путем отправки тестового сообщения.
          in: body
          schema:
            $ref: '#/definitions/CheckWebHookReactionCommandDto'
      responses:
        200:
          description: Отправка тестового web hook выполнена.
          schema:
            $ref: '#/definitions/WebHookCheckHttpCodeResultDto'
        400:
          description: BadRequest
          x-errors:
            - $ref: '#/definitions/WebHookCheckTimedoutError'
            - $ref: '#/definitions/WebHookCheckInvalidHttpCodeError'
            - $ref: '#/definitions/WebHookCheckSslCheckFailedError'
            - $ref: '#/definitions/WebHookConnectionFailedError'
            - $ref: '#/definitions/WebHookUnknownMetaTypeError'
            - $ref: '#/definitions/WebHookUriInvalidError'

definitions:

  CheckWebHookReactionCommandDto:
    type: object
    description: Команда для проверки отправки web hook уведомлений.
    properties:
      url:
        type: string
        description: адрес получения web hook.
      metaType:
        type: string
        description: Id выбранного пользователем метатриггера.
      checkSsl:
        type: boolean
        description: Проверять SSL при подключении через HTTPS.
        default: false
    required:
      - url
      - metaType

  WebHookCheckHttpCodeResultDto:
    type: object
    properties:
      statusCode:
        type: string
        description: HTTP Status code возвращенный потребителем web hook уведомлений.
    required:
        - statusCode

  CreatedTriggerResultDto:
    type: object
    description: Результат применения команды создания триггера.
    required:
      - id
    properties:
      id:
        description: Уникальный идентификатор.
        type: string
        format: guid
      creationStatus:
        description: Если задан commandId и данная команда была обратана ранее вернется - exists, иначе created.
        $ref: '#/definitions/TriggerCreationStatus'

  TriggerCreationStatus:
    type: string
    description: статус создания триггера.
    enum:
      - undefined
      - created
      - exists

  TriggerDto:
    type: object
    description: Описание триггера.
    required:
      - id
      - name
      - metaType
      - status
      - lastUpdate
      - reactions
      - schedulingParameters
    properties:
      id:
        description: Уникальный идентификатор.
        type: string
        format: guid
      name:
        description: Наименование.
        type: string
      description:
        description: Описание.
        type: string
      metaType:
        description: Мета-тип.
        type: string
      status:
        description: Статус.
        $ref: '#/definitions/TriggerStatus'
      authorId:
        description: Идентификатор создателя.
        type: string
      created:
        description: Время создания триггера.
        type: string
        format: date-time
      lastUpdate:
        description: Время последнего обновления.
        type: string
        format: date-time
      lastFired:
        description: Время последнего срабатывания триггера. Внимание. Не эквивалентно времени последней отправки уведомления. Опционально.
        type: string
        format: date-time
      renderedParametersPayload:
        description: Отрендеренные параметры триггера, содержащие DisplayNames и прочую инфу для отображения пользователю. Формат объекта согласовывается с конкретным сервисом-потребителем функционала триггеров.
          Могут быть null, в случае рендеринг параметров не удался.
        type: object
        additionalProperties: {}
      reactions:
        description: Реакции.
        type: array
        items:
          $ref: '#/definitions/ReactionDto'
      parameters:
        description: Параметры срабатывания.
        $ref: '#/definitions/TriggerParametersDto'
      timeZoneId:
        type: string
        description: IANA-идентификатор таймзоны триггера для отображения дат в уведомлении.
  CreateTriggerCommand:
    type: object
    description: Команда на создание триггера.
    required:
      - name      
      - metaType
      - parametersPayload
      - reactions
      - parameters
    properties:
      name:
        description: Наименование.
        type: string
      commandId:
        description: Идентификатор команды.
        type: string
      description:
        description: Описание.
        type: string
      metaType:
        description: Мета-тип.
        type: string
      parametersPayload:
        description: Параметры триггера. Формат объекта согласовывается с конкретным сервисом-потребителем функционала триггеров.      
        type: object
        additionalProperties: {}
      reactions:
        description: Реакции.
        type: array
        items:
          $ref: '#/definitions/ReactionDto'
      parameters:
        description: Параметры срабатывания.
        $ref: '#/definitions/TriggerParametersDto'
      timeZoneId:
        type: string
        description: IANA-идентификатор таймзоны триггера для отображения дат в уведомлении.
  UpdateTriggerCommand:
    type: object
    description: Команда на обновление триггера.
    required:
      - name      
      - parametersPayload
      - reactions
      - parameters
    properties:
      name:
        description: Наименование.
        type: string
      description:
        description: Описание.
        type: string
      parametersPayload:
        description: Параметры триггера. Формат объекта согласовывается с конкретным сервисом-потребителем функционала триггеров.             
        type: object
        additionalProperties: {}
      reactions:
        description: Реакции.
        type: array
        items:
          $ref: '#/definitions/ReactionDto'
      parameters:
        description: Параметры срабатывания.
        $ref: '#/definitions/TriggerParametersDto'
      timeZoneId:
        type: string
        description: IANA-идентификатор таймзоны триггера для отображения дат в уведомлении.
  ReactionDto:
    type: object
    discriminator: type
    description: Реакция на срабатывание.
    required:
      - type
    properties:
      type:
        type: string
  EmailNotification:
    type: object
    description: Реакция на срабатывание - отправка письма по e-mail.
    allOf:
      - $ref: '#/definitions/ReactionDto'
      - type: object
        properties:
          participants:
            type: array
            description: Получатели письмем с данными. 
            items:
              $ref: '#/definitions/ParticipantDto'
        required:
         - participants
  WebHook:
    type: object
    description: Реакция на срабатывание - http post запрос.
    allOf:
      - $ref: '#/definitions/ReactionDto'
      - type: object
        properties:
          uri:
            type: string
            description: Uri для отправки post-запроса.
          checkSsl:
            type: boolean
            description: Проверять SSL при отправке web hook уведомления через HTTPS соединение.
            default: false
        required:
          - uri
  ParticipantDto:
    type: object
    description: Получатель письма.
    discriminator: type
    required:
      - type
    properties:
      type:
        type: string
  EmailParticipantDto:
    type: object
    description: Получатель письма с указанным e-mail адресом.
    allOf:
      - $ref: '#/definitions/ParticipantDto'
      - type: object
        properties:
          email:
            type: string
  SystemParticipantDto:
    type: object
    description: Получатель письма - пользователь системы.
    allOf:
      - $ref: '#/definitions/ParticipantDto'
      - type: object
        properties:
          id:
            description: Идентификатор пользователя системы.
            type: string
            format: guid
  ContextParticipantDto:
    type: object
    description: Контекстно зависимый получатель письма, например ответственный за инцидент.
    allOf:
      - $ref: '#/definitions/ParticipantDto'
      - type: object
        properties:
          id:
            type: string
            description: Идентификатор.
  TriggerStatus:
    type: string
    description: Состояние триггера.
    enum:
      - unknown
      - active
      - inactive
      - invalid

  DayOfWeek:
    type: string
    description: дни недели.
    enum:
      - notDefined
      - sunday
      - monday
      - tuesday
      - wednesday
      - thursday
      - friday
      - saturday

  TriggerParametersDto:
    description: Базовый тип параметров срабатывания
    type: object
    discriminator: type
    required:
      - type
    properties:
      type:
        type: string

  TriggerByEventsParametersDto:
    description: Параметры срабатывания по событиям
    type: object
    allOf:
      - $ref: '#/definitions/TriggerParametersDto'

  CalcNextFiresCommandDto:
    description: 
    type: object
    required:
       - parameters
    properties:
       parameters:
         type: array
         items:
           $ref: '#/definitions/SchedulerParametersWithIdDto'

  SchedulerParametersWithIdDto:
    type: object
    required:
      - id
      - parameters
    properties:
      id:
        type: string
        format: guid
      parameters:
        description: Параметры срабатывания.
        $ref: '#/definitions/TriggerBySchedulerParametersDto'

  CalcNextFiresResponseDto:
    type: object
    properties:
       nextFires:
         type: array
         items:
           $ref: '#/definitions/NextFireDto'

  NextFireDto:
    description: Следующий запуск
    type: object
    required:
      - id
    properties:
      id:
        type: string
        format: guid
      time:
        type: string
        format: date-time

  TriggerBySchedulerParametersDto:
    description: Базовые параметры срабатывания по таймеру
    type: object
    allOf:
      - $ref: '#/definitions/TriggerParametersDto'
      - type: object
        required:
          - fromDate
        properties:
          fromDate:
            type: string
            format: date-time
          toDate:
            type: string
            format: date-time

  DailyTriggerBySchedulerParametersDto:
    type: object
    description: Параметры срабатывания по таймеру - 1 раз в день
    allOf:
      - $ref: '#/definitions/TriggerBySchedulerParametersDto'
      - type: object
        required:
          - atTime
          - daysOfWeek
        properties:
          atTime:
            type: string
            format: time-span
          timeZone:
            type: string
            format: timezone
          daysOfWeek:
            type: array
            items:
              $ref: '#/definitions/DayOfWeek'
          timeZoneId:
            type: string
            description: IANA-идентификатор таймзоны. Задаётся вместо смещения timeZone

  WeeklyTriggerBySchedulerParametersDto:
    type: object
    description: Параметры срабатывания по таймеру - каждую N-ую неделю (без ограничения/месяца/года) в заданные дни недели
    allOf:
      - $ref: '#/definitions/TriggerBySchedulerParametersDto'
      - type: object
        required:
          - atTime
          - daysOfWeek
        properties:
          recurrence:
            type: integer
            description: Период повторяемости, каждую N-ную неделю, где N > 0
          recurrenceRange:
              $ref: '#/definitions/RecurrenceRange'
              description: Диапазон повторяемости, в пределах которого будет действовать период повторяемости
          atTime:
            type: string
            format: time-span
          timeZone:
            type: string
            format: timezone
          daysOfWeek:
            type: array
            items:
              $ref: '#/definitions/DayOfWeek'
